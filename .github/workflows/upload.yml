name: Automated YouTube Upload

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: automated-upload-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        shell: bash
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          missing=()
          [[ -n "${GOOGLE_CLIENT_ID:-}" ]] || missing+=("GOOGLE_CLIENT_ID")
          [[ -n "${GOOGLE_CLIENT_SECRET:-}" ]] || missing+=("GOOGLE_CLIENT_SECRET")
          if (( ${#missing[@]} > 0 )); then
            echo "Missing required GitHub Action secrets:"
            for item in "${missing[@]}"; do
              echo " - $item"
            done
            exit 1
          fi

      - name: Run automated uploader
        env:
          CHANNEL_GAP_SECONDS: "120"
          VIDEOS_PER_DAY: "5"
          AUTO_SCHEDULE_ENABLED: "true"
          MIN_GAP_HOURS: "2"
          MAX_GAP_HOURS: "6"
          TIME_VARIATION_MINUTES: "30"
          ENABLE_DAILY_SHIFT: "true"
        run: node automation/upload.js
