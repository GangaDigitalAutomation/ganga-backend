name: Run Backend Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  run-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: ganga-backend-automation
      cancel-in-progress: false
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute automation script
        id: automation
        env:
          DRIVE_API_KEY: ${{ secrets.DRIVE_API_KEY || secrets.API_KEY }}
          DRIVE_FOLDER_IDS: ${{ secrets.DRIVE_FOLDER_IDS }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          VIDEOS_PER_DAY: ${{ secrets.VIDEOS_PER_DAY }}
          TITLES_JSON: ${{ secrets.TITLES_JSON }}
          DEFAULT_DESCRIPTION: ${{ secrets.DEFAULT_DESCRIPTION }}
          DEFAULT_TAGS: ${{ secrets.DEFAULT_TAGS }}
          TOKEN_API_URL: ${{ secrets.TOKEN_API_URL }}
          TOKENS_JSON: ${{ secrets.TOKENS_JSON }}
          TOKEN_API_TIMEOUT_SEC: ${{ secrets.TOKEN_API_TIMEOUT_SEC }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_TOKEN_URI: ${{ secrets.YOUTUBE_TOKEN_URI }}
          YOUTUBE_PRIVACY_STATUS: ${{ secrets.YOUTUBE_PRIVACY_STATUS }}
          RETRY_ATTEMPTS: ${{ secrets.RETRY_ATTEMPTS }}
          RETRY_BACKOFF_SEC: ${{ secrets.RETRY_BACKOFF_SEC }}
        run: |
          python -m backend.main | tee backend-run.log

      - name: Publish upload summary
        if: always()
        run: |
          success_count=$(grep -c "\[UPLOAD_SUCCESS\]" backend-run.log || true)
          fail_count=$(grep -c "\[ERROR\] Upload failed" backend-run.log || true)
          skip_count=$(grep -c "\[SKIP\]" backend-run.log || true)
          channel_done_count=$(grep -c "\[CHANNEL_DONE\]" backend-run.log || true)
          diag_reason=$(grep -o "EXIT_REASON=[A-Z_]*" backend-run.log | tail -n 1 | cut -d= -f2 || true)
          channels_found=$(grep -o "CHANNELS_FOUND=[0-9]*" backend-run.log | tail -n 1 | cut -d= -f2 || true)
          videos_found=$(grep -o "VIDEOS_FOUND=[0-9]*" backend-run.log | tail -n 1 | cut -d= -f2 || true)

          {
            echo "## Automation Summary"
            echo ""
            echo "- Upload Success: ${success_count}"
            echo "- Upload Failed: ${fail_count}"
            echo "- Skipped (duplicate/already uploaded): ${skip_count}"
            echo "- Channels Processed: ${channel_done_count}"
            echo "- Channels Found (token API): ${channels_found:-0}"
            echo "- Videos Found (Drive): ${videos_found:-0}"
            echo "- Exit Reason: ${diag_reason:-UNKNOWN}"
          } >> "$GITHUB_STEP_SUMMARY"
