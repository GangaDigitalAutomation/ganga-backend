version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gda
      POSTGRES_PASSWORD: gda
      POSTGRES_DB: gda
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    restart: unless-stopped
    command: node dist/index.js
    ports:
      - "8080:8080"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgres://gda:gda@postgres:5432/gda
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 8080
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    restart: unless-stopped
    command: node dist/worker.js
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgres://gda:gda@postgres:5432/gda
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  scheduler:
    build: .
    restart: unless-stopped
    command: node dist/scheduler.js
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgres://gda:gda@postgres:5432/gda
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

volumes:
  pg_data:
